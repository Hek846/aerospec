name: aerospec
description: AeroSpec Mobile App - Air Quality Monitoring
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP client
  dio: ^5.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # BLE
  flutter_blue_plus: ^1.31.0

  # Runtime permissions (BLE scan/connect)
  permission_handler: ^11.0.0

  # Maps
  google_maps_flutter: ^2.5.0

  # Charts
  fl_chart: ^0.66.0

  # Date formatting
  intl: ^0.18.1

  # JSON serialization
  json_annotation: ^4.8.1

  # TODO: Add Firebase when ready to configure
  # firebase_messaging: ^14.7.6
  # firebase_analytics: ^10.7.4

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Caching
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # JSON code generation
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

  # App icons
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

  # Localization
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#26D0CE"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
